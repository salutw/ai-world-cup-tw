name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
  schedule:
    # 14:00 Taiwan time, daily. GitHub cron uses UTC.
    - cron: "0 6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Resolve Taiwan date
        id: taiwan-date
        run: echo "date=$(TZ=Asia/Taipei date -d '+10 hours' +%F)" >> "$GITHUB_OUTPUT"

      - name: Update match schedule
        run: npm run update:schedule

      - name: Build match catalog
        run: npm run build:github
        env:
          DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_BOARD_DATE_TW: ${{ steps.taiwan-date.outputs.date }}
          NEXT_PUBLIC_TODAY_TW: ${{ steps.taiwan-date.outputs.date }}

      - name: Update completed match history
        run: npm run update:results

      - name: Sync SQLite history database
        shell: bash
        run: |
          if ! git diff --quiet -- data/match-history.json || [ ! -f data/world-cup-history.sqlite ]; then
            python scripts/build-history-db.py
          fi

      - name: Build static site
        run: npm run build:github
        env:
          DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_BOARD_DATE_TW: ${{ steps.taiwan-date.outputs.date }}
          NEXT_PUBLIC_TODAY_TW: ${{ steps.taiwan-date.outputs.date }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Commit data updates
        shell: bash
        run: |
          if ! git diff --quiet -- data; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/match-schedule.json data/match-history.json data/world-cup-history.sqlite
            git commit -m "Update match schedule and history"
            git push
          fi
