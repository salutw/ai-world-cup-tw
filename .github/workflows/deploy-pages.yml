name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
  schedule:
    - cron: "10 16 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Resolve Taiwan date
        id: taiwan-date
        run: echo "date=$(TZ=Asia/Taipei date -d '+6 hours' +%F)" >> "$GITHUB_OUTPUT"

      - name: Build static site
        run: npm run build:github
        env:
          DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_BOARD_DATE_TW: ${{ steps.taiwan-date.outputs.date }}
          NEXT_PUBLIC_TODAY_TW: ${{ steps.taiwan-date.outputs.date }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
